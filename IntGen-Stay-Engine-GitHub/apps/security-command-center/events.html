<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aura — Security Incidents</title>
<link rel="stylesheet" href="assets/theme.css" />

<style>
  * {
    font-family: Arial, sans-serif;
  }

  .view-head {
    border-bottom: 1px solid rgba(255,255,255,.08);
  }

  .app {
    grid-template-columns: 300px 1fr;
    grid-template-rows: 60px 1fr;
    grid-template-areas:
      "topbar topbar"
      "side main";
  }

  .vh-ico {
    background: rgba(255,255,255,.06) !important;
    border: 1px solid rgba(255,255,255,.12) !important;
    box-shadow: none !important;
  }

  .vh-sub {
    max-width: 820px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 22px;
  }

  .metric-card {
    min-height: 122px;
    border-radius: var(--radius-sm);
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    background:
      radial-gradient(circle at 18% 18%, rgba(79,140,255,.22), transparent 36%),
      linear-gradient(180deg, rgba(8, 12, 24, 0.66), rgba(5, 8, 16, 0.48));
    border: 1px solid rgba(150,175,220,.14);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.08),
      0 18px 40px rgba(0,0,0,.22);
  }

  .metric-ring {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    position: relative;
    flex-shrink: 0;
    background: conic-gradient(rgba(235,239,255,.92) var(--p), rgba(255,255,255,.10) 0);
  }

  .metric-ring::after {
    content: "";
    position: absolute;
    inset: 7px;
    border-radius: 50%;
    background: rgba(8,12,26,.94);
  }

  .metric-ring span {
    position: relative;
    z-index: 1;
    color: #fff;
    font-size: 19px;
    font-weight: 700;
  }

  .metric-icon {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 21px;
    color: rgba(255,255,255,.88);
    background: rgba(255,255,255,.075);
    border: 1px solid rgba(255,255,255,.12);
  }

  .metric-title {
    font-size: 20px;
    font-weight: 700;
    color: rgba(245,248,255,.96);
    line-height: 1.1;
  }

  .metric-sub {
    margin-top: 7px;
    font-size: 12px;
    color: rgba(234,240,252,.50);
    line-height: 1.35;
  }

  .filters {
    display: flex;
    gap: 9px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: rgba(234,240,252,.42);
    font-weight: 700;
    margin-right: 4px;
  }

  .fbtn {
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: rgba(234,240,252,.58);
    background: rgba(255,255,255,.045);
    border: 1px solid rgba(255,255,255,.09);
    transition: .16s ease;
  }

  .fbtn:hover {
    color: rgba(255,255,255,.88);
    background: rgba(255,255,255,.07);
  }

  .fbtn.active {
    color: rgba(255,255,255,.94);
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.18);
  }

  .fbtn .c {
    font-size: 10px;
    opacity: .72;
    margin-left: 5px;
  }

  .soft-table-card {
    padding: 8px;
    border-radius: var(--radius-sm);
    background:
      linear-gradient(180deg, rgba(8, 12, 24, 0.66), rgba(5, 8, 16, 0.48));
    border: 1px solid rgba(150,175,220,.14);
    box-shadow: 0 24px 60px rgba(0,0,0,.24);
    overflow: hidden;
  }

  .dtable {
    border-collapse: separate;
    border-spacing: 0 8px;
  }

  .dtable thead th {
    color: rgba(234,240,252,.42);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .7px;
    text-transform: uppercase;
    border-bottom: none;
    padding: 10px 14px;
  }

  .dtable tbody tr {
    background:
      radial-gradient(circle at 4% 20%, rgba(116,145,255,.14), transparent 32%),
      rgba(255,255,255,.035);
    transition: .16s ease;
  }

  .dtable tbody tr:hover {
    background:
      radial-gradient(circle at 4% 20%, rgba(116,145,255,.22), transparent 34%),
      rgba(255,255,255,.055);
  }

  .dtable tbody td {
    border-top: 1px solid rgba(255,255,255,.07);
    border-bottom: 1px solid rgba(255,255,255,.07);
    padding: 16px 14px;
  }

  .dtable tbody td:first-child {
    border-left: 1px solid rgba(255,255,255,.07);
    border-radius: 10px 0 0 10px;
  }

  .dtable tbody td:last-child {
    border-right: 1px solid rgba(255,255,255,.07);
    border-radius: 0 10px 10px 0;
  }

  .ev-title-cell {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .event-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 17px;
    color: rgba(255,255,255,.88);
    background: rgba(255,255,255,.075);
    border: 1px solid rgba(255,255,255,.12);
  }

  .ev-title-cell .et {
    font-weight: 700;
    color: rgba(245,248,255,.95);
    font-size: 14px;
    line-height: 1.35;
  }

  .ev-title-cell .es {
    font-size: 11px;
    color: rgba(234,240,252,.45);
    margin-top: 4px;
    max-width: 520px;
    line-height: 1.45;
  }

  .ev-meta {
    font-size: 10.5px;
    color: rgba(234,240,252,.34);
    margin-top: 6px;
  }

  .ev-meta b {
    color: rgba(234,240,252,.58);
    font-weight: 600;
  }

  .soft-pill {
    display: inline-flex;
    align-items: center;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(245,248,255,.76);
    background: rgba(255,255,255,.065);
    border: 1px solid rgba(255,255,255,.10);
    white-space: nowrap;
  }

  .stagebar {
    display: flex;
    align-items: center;
    gap: 7px;
    min-width: 150px;
  }

  .stagebar .rail {
    width: 86px;
    height: 7px;
    border-radius: 999px;
    background: rgba(255,255,255,.09);
    overflow: hidden;
    position: relative;
  }

  .stagebar .fill {
    height: 100%;
    width: var(--w);
    border-radius: 999px;
    background: rgba(235,239,255,.82);
  }

  .stagebar .sl {
    font-size: 10.5px;
    color: rgba(234,240,252,.48);
    white-space: nowrap;
  }

  .owner-text {
    color: rgba(245,248,255,.82);
    font-weight: 600;
  }

  .soft-status {
    display: inline-flex;
    align-items: center;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(245,248,255,.72);
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.09);
    white-space: nowrap;
  }

  .mono-age {
    font-family: Arial, sans-serif;
    color: rgba(234,240,252,.42);
    font-size: 12px;
  }

  @media (max-width: 1100px) {
    .summary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
</head>

<body>
<div class="app">
  <aside class="sidebar glass"></aside>
  <header class="topbar glass" data-crumb="Security Incidents"></header>

  <section class="view glass">
    <div class="view-head">
      <div>
        <h2>Security Incidents</h2>
      </div>
      <div class="vh-acts">
        <button class="btn sm" onclick="window.toast('Exported incidents to security report')">Export</button>
        <a class="btn primary sm" href="index.html">Open Live View</a>
      </div>
    </div>

    <div class="view-body">

      <div class="summary-grid">
        <div class="metric-card">
          <div class="metric-ring" style="--p:72%">
            <span id="k-active">0</span>
          </div>
          <div>
            <div class="metric-title">Active Incidents</div>
            <div class="metric-sub">live security signals</div>
          </div>
        </div>

        <div class="metric-card">
          <div class="metric-ring" style="--p:38%">
            <span id="k-crit">0</span>
          </div>
          <div>
            <div class="metric-title">Priority</div>
            <div class="metric-sub">requires attention</div>
          </div>
        </div>

        <div class="metric-card">
          <div class="metric-ring" style="--p:56%">
            <span id="k-warn">0</span>
          </div>
          <div>
            <div class="metric-title">Warnings</div>
            <div class="metric-sub">elevated security signals</div>
          </div>
        </div>

        <div class="metric-card">
          <div>
            <div class="metric-title">37</div>
            <div class="metric-sub">auto-handled today</div>
          </div>
        </div>
      </div>

      <div class="filters" id="filters">
        <span class="filter-label">Filter</span>
        <div class="fbtn active" data-f="all">All <span class="c" id="fc-all"></span></div>
        <div class="fbtn" data-f="crit">Priority <span class="c" id="fc-crit"></span></div>
        <div class="fbtn" data-f="warn">Warning <span class="c" id="fc-warn"></span></div>
        <div class="fbtn" data-f="info">Info <span class="c" id="fc-info"></span></div>
        <span style="width:1px;height:22px;background:rgba(255,255,255,.09);margin:0 4px"></span>
        <div class="fbtn" data-z="lobby">Public Areas</div>
        <div class="fbtn" data-z="fnb">F&amp;B</div>
        <div class="fbtn" data-z="rooms">Guest Floors</div>
      </div>

      <div class="soft-table-card">
        <table class="dtable">
          <thead>
            <tr>
              <th>Event</th>
              <th>Type</th>
              <th>Zone</th>
              <th>Lifecycle</th>
              <th>Owner</th>
              <th>Status</th>
              <th>Age</th>
            </tr>
          </thead>
          <tbody id="evRows"></tbody>
        </table>
      </div>

    </div>
  </section>
</div>

<script>
window.AURA_PAGE = 'events';
</script>

<script src="assets/data.js"></script>
<script src="assets/shell.js"></script>

<script>
const STAGES = [
  'Triggered',
  'AI Analyzing',
  'Assessing',
  'Recommending',
  'Assigned',
  'Escalating',
  'Resolved'
];

const ZN = AURA_ZONE_NAME;

let fSev = 'all';
let fZone = null;

function stageBar(s) {
  const p = Math.min(100, Math.max(8, Math.round((s / 6) * 100)));

  return `
    <div class="stagebar">
      <div class="rail">
        <div class="fill" style="--w:${p}%"></div>
      </div>
      <span class="sl">${STAGES[Math.min(s, 6)]}</span>
    </div>
  `;
}

function statusText(e) {
  if (e.escIn === 'Resolved') return 'Resolved';
  if (e.escIn.includes('→')) return e.escIn;
  return e.escIn;
}

function rows() {
  let list = AURA_EVENTS.filter(e =>
    (fSev === 'all' || e.sev === fSev) &&
    (!fZone || e.zone === fZone)
  );

  const order = { crit: 0, warn: 1, info: 2 };

  list.sort((a, b) =>
    (a.stage < 6 ? 0 : 1) - (b.stage < 6 ? 0 : 1) ||
    order[a.sev] - order[b.sev]
  );

  document.getElementById('evRows').innerHTML = list.length ? list.map(e => `
    <tr>
      <td>
        <div class="ev-title-cell">
          <div>
            <div class="et">${e.title}</div>
            <div class="es">${e.desc}</div>
            <div class="ev-meta"><b>${e.id}</b> · ${e.source}</div>
          </div>
        </div>
      </td>
      <td><span class="soft-pill">${e.tag}</span></td>
      <td><span class="soft-pill">${ZN[e.zone]}</span></td>
      <td>${stageBar(e.stage)}</td>
      <td><span class="owner-text">${e.owner}</span></td>
      <td><span class="soft-status">${statusText(e)}</span></td>
      <td class="mono-age">${e.age}</td>
    </tr>
  `).join('') : `
    <tr>
      <td colspan="7" style="text-align:center;padding:42px;color:rgba(234,240,252,.42)">
        No events match this filter.
      </td>
    </tr>
  `;
}

function kpis() {
  const active = AURA_EVENTS.filter(e => e.stage < 6);

  document.getElementById('k-crit').textContent =
    active.filter(e => e.sev === 'crit').length;

  document.getElementById('k-warn').textContent =
    active.filter(e => e.sev === 'warn').length;

  document.getElementById('k-active').textContent =
    active.length;

  document.getElementById('fc-all').textContent =
    AURA_EVENTS.length;

  ['crit', 'warn', 'info'].forEach(s => {
    document.getElementById('fc-' + s).textContent =
      AURA_EVENTS.filter(e => e.sev === s).length;
  });
}

document.querySelectorAll('#filters .fbtn').forEach(btn => {
  btn.addEventListener('click', function () {
    if (this.dataset.f != null) {
      fSev = this.dataset.f;

      document.querySelectorAll('#filters [data-f]').forEach(x => {
        x.classList.toggle('active', x === this);
      });
    }

    if (this.dataset.z != null) {
      const z = this.dataset.z;
      fZone = fZone === z ? null : z;

      document.querySelectorAll('#filters [data-z]').forEach(x => {
        x.classList.toggle('active', x.dataset.z === fZone);
      });
    }

    rows();
  });
});

kpis();
rows();
</script>
</body>
</html>
